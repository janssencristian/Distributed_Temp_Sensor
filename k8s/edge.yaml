apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-nordeste
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-nordeste
  template:
    metadata:
      labels:
        app: edge-nordeste
    spec:
      nodeSelector:
        region: nordeste
      containers:
        - name: edge
          image: janssencristian/edge:1.0
          env:
            - name: CLOUD_URL
              value: http://cloud-service:8000
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: edge-nordeste-service
spec:
  selector:
    app: edge-nordeste
  ports:
    - port: 8000
      targetPort: 8000